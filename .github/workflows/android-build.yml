
name: Android APK Build

on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_android_apk:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Java Development Kit
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install dependencies
      # This assumes your React Native project is at the root of the repository.
      # If your project is in a subdirectory (e.g., 'my-app'), you'll need to add 'working-directory: ./my-app'
      run: yarn install

    - name: Grant execute permission to gradlew
      # This step requires an 'android' folder at the root of your React Native project.
      # If your project is in a subdirectory, adjust the 'working-directory' accordingly.
      run: chmod +x android/gradlew
      working-directory: ./android

    - name: Build Android Release APK
      # This step requires an 'android' folder at the root of your React Native project.
      # If your project is in a subdirectory, adjust the 'working-directory' accordingly.
      run: ./gradlew assembleRelease
      working-directory: ./android

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: android/app/build/outputs/apk/release/app-release.apk
